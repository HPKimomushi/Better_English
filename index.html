<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="theme-color" content="#0a0a1e">

<title>Shadowing</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

:root {
  /* Liquid Glass tokens */
  --tint-soft: rgba(255,255,255,0.06);
  --tint-medium: rgba(255,255,255,0.10);
  --tint-bright: rgba(255,255,255,0.18);
  --border-dim: 1px solid rgba(255,255,255,0.12);
  --border-mid: 1px solid rgba(255,255,255,0.22);
  --border-glow: 1px solid rgba(255,255,255,0.45);
  --shadow-float: 0 8px 32px rgba(0,0,0,0.35);
  --shadow-deep: 0 20px 60px rgba(0,0,0,0.5);
  --shadow-inner: inset 0 0 20px -5px rgba(255,255,255,0.35);
  --radius-sm: 12px;
  --radius-md: 18px;
  --radius-lg: 24px;
  --radius-pill: 999px;
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --accent: #5b8cff;
  --accent-2: #c084fc;
  --success: #30D158;
  --warning: #FFB340;
  --text-primary: rgba(255,255,255,0.95);
  --text-secondary: rgba(255,255,255,0.6);
  --text-tertiary: rgba(255,255,255,0.4);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0; height: 100%; overflow: hidden;
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  background: #0a0a1e;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }

/* ===== Animated background mesh ===== */
.bg-mesh {
  position: fixed; inset: 0; z-index: -1; overflow: hidden;
  background: linear-gradient(135deg, #0a0a1e 0%, #16213e 50%, #1a1a3e 100%);
}
.bg-mesh::before, .bg-mesh::after,
.bg-blob {
  content: ''; position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.55;
  will-change: transform;
}
.bg-mesh::before {
  width: 60vw; height: 60vw; top: -20%; left: -15%;
  background: radial-gradient(circle, #5b8cff 0%, transparent 70%);
  animation: float1 16s ease-in-out infinite;
}
.bg-mesh::after {
  width: 55vw; height: 55vw; bottom: -20%; right: -15%;
  background: radial-gradient(circle, #c084fc 0%, transparent 70%);
  animation: float2 20s ease-in-out infinite;
}
.bg-blob {
  width: 45vw; height: 45vw; top: 30%; left: 30%;
  background: radial-gradient(circle, #ff6b9d 0%, transparent 70%);
  opacity: 0.3;
  animation: float3 24s ease-in-out infinite;
}
@keyframes float1 {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(8vw, 6vh) scale(1.1); }
}
@keyframes float2 {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-6vw, -8vh) scale(1.15); }
}
@keyframes float3 {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-10vw, 10vh) scale(0.9); }
}

/* ===== App layout ===== */
#app {
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}

/* ===== Glass primitives ===== */
.glass {
  position: relative;
  isolation: isolate;
  background: var(--tint-soft);
  border: var(--border-dim);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
}
.glass::before {
  content: ''; position: absolute; inset: 0; z-index: -1;
  border-radius: inherit;
  box-shadow: var(--shadow-inner);
  pointer-events: none;
}

/* ===== Header ===== */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: max(env(safe-area-inset-top), 12px) 14px 12px;
  border-radius: 0;
  border-left: none; border-right: none; border-top: none;
  border-bottom: var(--border-dim);
  background: rgba(10,10,30,0.4);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  flex-shrink: 0; z-index: 4;
  position: relative;
}
.header h1 {
  margin: 0; font-size: 16px; font-weight: 600; flex: 1; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 8px;
  letter-spacing: -0.01em;
}
.icon-btn {
  width: 38px; height: 38px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  background: var(--tint-soft);
  border: var(--border-dim);
  transition: all 0.2s var(--ease-smooth);
}
.icon-btn:active { transform: scale(0.94); background: var(--tint-medium); }

/* ===== Main ===== */
.main {
  flex: 1; overflow-y: auto;
  padding: 14px 12px 220px;
  scroll-behavior: smooth;
}
.empty {
  height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text-secondary); text-align: center; padding: 40px 30px;
  animation: fadeUp 0.5s var(--ease-smooth);
}
.empty-icon {
  font-size: 56px; margin-bottom: 20px;
  filter: drop-shadow(0 8px 24px rgba(91,140,255,0.4));
}
.empty-text { font-size: 14px; line-height: 1.7; font-weight: 300; }
.empty-text strong { font-weight: 600; color: var(--text-primary); }

/* ===== Paragraph cards ===== */
.paragraph {
  border-radius: var(--radius-md);
  padding: 14px 14px 14px 14px;
  margin-bottom: 10px;
  position: relative; isolation: isolate;
  background: var(--tint-soft);
  border: var(--border-dim);
  backdrop-filter: blur(14px) saturate(180%);
  -webkit-backdrop-filter: blur(14px) saturate(180%);
  transition: all 0.25s var(--ease-smooth);
  animation: fadeUp 0.4s var(--ease-smooth) backwards;
}
.paragraph::before {
  content: ''; position: absolute; inset: 0; z-index: -1;
  border-radius: inherit;
  box-shadow: inset 0 0 24px -8px rgba(255,255,255,0.25);
  pointer-events: none;
}
.paragraph.active {
  background: rgba(91,140,255,0.15);
  border-color: rgba(91,140,255,0.5);
  box-shadow: 0 4px 24px rgba(91,140,255,0.25);
  transform: translateY(-1px);
}
.paragraph.done { opacity: 0.45; }
.paragraph.ab-marked {
  border-color: rgba(255,179,64,0.55);
  box-shadow: 0 4px 20px rgba(255,179,64,0.2);
}
.paragraph-head {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.checkbox {
  width: 22px; height: 22px; border-radius: 7px;
  border: 1.5px solid rgba(255,255,255,0.3);
  background: var(--tint-soft);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 13px;
  transition: all 0.2s var(--ease-spring);
}
.checkbox.checked {
  background: linear-gradient(135deg, #30D158, #1ea843);
  border-color: #30D158;
  color: #fff;
  box-shadow: 0 2px 12px rgba(48,209,88,0.4);
}
.checkbox:active { transform: scale(0.88); }
.timestamp {
  font-size: 11px; padding: 5px 11px;
  background: var(--tint-medium);
  border: var(--border-dim);
  border-radius: var(--radius-pill);
  color: #93b5ff; font-variant-numeric: tabular-nums; font-weight: 600;
  transition: all 0.15s var(--ease-smooth);
}
.timestamp:active {
  transform: scale(0.95);
  background: rgba(91,140,255,0.3);
}
.speaker {
  font-size: 11px; color: var(--text-secondary); flex: 1;
  font-weight: 400; letter-spacing: 0.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ab-btn {
  width: 30px; height: 30px; border-radius: 9px; font-size: 14px;
  background: var(--tint-soft);
  border: var(--border-dim);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--ease-spring);
}
.ab-btn.active {
  background: linear-gradient(135deg, #FFB340, #ff8c1a);
  border-color: #FFB340;
  color: #fff;
  box-shadow: 0 2px 12px rgba(255,179,64,0.4);
}
.ab-btn:active { transform: scale(0.9); }
.paragraph-text {
  font-size: 14.5px; line-height: 1.75; color: var(--text-primary);
  margin: 0; word-wrap: break-word; font-weight: 400;
  letter-spacing: -0.005em;
}

/* ===== Player ===== */
.player {
  position: absolute; left: 8px; right: 8px;
  bottom: max(env(safe-area-inset-bottom), 8px);
  border-radius: var(--radius-lg);
  padding: 12px 14px 12px;
  z-index: 5;
  background: rgba(15,15,30,0.55);
  border: var(--border-mid);
  backdrop-filter: blur(24px) saturate(190%);
  -webkit-backdrop-filter: blur(24px) saturate(190%);
  box-shadow: var(--shadow-deep);
  isolation: isolate;
  animation: fadeUp 0.4s var(--ease-spring);
}
.player::before {
  content: ''; position: absolute; inset: 0; z-index: -1;
  border-radius: inherit;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), inset 0 0 24px -8px rgba(255,255,255,0.15);
  pointer-events: none;
}
.player.hidden { display: none; }
.progress-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  font-size: 10.5px; color: var(--text-secondary); font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.progress {
  flex: 1; height: 4px; background: rgba(255,255,255,0.12);
  border-radius: var(--radius-pill);
  position: relative; cursor: pointer;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: var(--radius-pill);
  width: 0%; pointer-events: none;
  transition: width 0.05s linear;
  box-shadow: 0 0 8px rgba(91,140,255,0.5);
}
.controls {
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
}
.ctrl-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--tint-medium);
  border: var(--border-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
  font-weight: 600;
  transition: all 0.2s var(--ease-spring);
}
.ctrl-btn:active { transform: scale(0.9); background: var(--tint-bright); }
.ctrl-btn.play {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  border: 1px solid rgba(255,255,255,0.3);
  font-size: 20px;
  box-shadow: 0 4px 20px rgba(91,140,255,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
}
.ctrl-btn.play:active {
  transform: scale(0.92);
  box-shadow: 0 2px 12px rgba(91,140,255,0.4);
}
.speed-row {
  display: flex; gap: 5px; justify-content: center; margin-top: 10px;
}
.speed-btn {
  flex: 1;
  padding: 7px 0; height: 32px;
  border-radius: var(--radius-pill);
  background: var(--tint-soft);
  border: var(--border-dim);
  font-size: 11.5px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--ease-smooth);
  color: var(--text-secondary);
}
.speed-btn.active {
  background: rgba(91,140,255,0.25);
  border-color: rgba(91,140,255,0.5);
  color: #fff;
  box-shadow: 0 2px 8px rgba(91,140,255,0.3);
}
.speed-btn:active { transform: scale(0.95); }

/* ===== Sidebar ===== */
.overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 10; opacity: 0; pointer-events: none;
  transition: opacity 0.3s var(--ease-smooth);
}
.overlay.open { opacity: 1; pointer-events: auto; }
.sidebar {
  position: absolute; top: 8px; left: 8px; bottom: 8px;
  width: 85%; max-width: 340px;
  z-index: 20;
  border-radius: var(--radius-lg);
  background: rgba(15,15,30,0.75);
  border: var(--border-mid);
  backdrop-filter: blur(28px) saturate(190%);
  -webkit-backdrop-filter: blur(28px) saturate(190%);
  box-shadow: var(--shadow-deep);
  transform: translateX(calc(-100% - 16px));
  transition: transform 0.35s var(--ease-spring);
  display: flex; flex-direction: column;
  isolation: isolate;
  overflow: hidden;
}
.sidebar::before {
  content: ''; position: absolute; inset: 0; z-index: -1;
  border-radius: inherit;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), inset 0 0 30px -10px rgba(255,255,255,0.15);
  pointer-events: none;
}
.sidebar.open { transform: translateX(0); }
.sidebar-header {
  padding: max(env(safe-area-inset-top), 18px) 18px 14px;
  border-bottom: var(--border-dim);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-header h2 {
  margin: 0; font-size: 18px; font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff 0%, #c0c8ff 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.sidebar-list { flex: 1; overflow-y: auto; padding: 10px; }
.sidebar-empty {
  text-align: center; padding: 40px 20px;
  color: var(--text-tertiary); font-size: 13px; font-weight: 300;
}
.sidebar-item {
  padding: 12px 12px;
  border-radius: var(--radius-md);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
  background: var(--tint-soft);
  border: 1px solid transparent;
  transition: all 0.2s var(--ease-smooth);
}
.sidebar-item:active {
  transform: scale(0.98);
  background: var(--tint-medium);
}
.sidebar-item.active {
  background: rgba(91,140,255,0.18);
  border-color: rgba(91,140,255,0.4);
  box-shadow: 0 2px 12px rgba(91,140,255,0.2);
}
.sidebar-item-info { flex: 1; min-width: 0; cursor: pointer; }
.sidebar-item-title {
  font-size: 13.5px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -0.01em;
}
.sidebar-item-meta {
  font-size: 11px; color: var(--text-secondary);
  margin-top: 3px; font-weight: 400;
  display: flex; align-items: center; gap: 6px;
}
.mini-progress {
  flex: 1; max-width: 80px; height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: var(--radius-pill);
  overflow: hidden;
}
.mini-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--success), #5fe07e);
  border-radius: inherit;
}
.sidebar-item-delete {
  padding: 6px 10px; font-size: 11px; color: #ff6b6b;
  border-radius: 8px;
  background: rgba(255,107,107,0.08);
  border: 1px solid rgba(255,107,107,0.2);
  flex-shrink: 0;
  font-weight: 500;
}
.sidebar-item-delete:active { background: rgba(255,107,107,0.2); }
.import-area {
  padding: 14px 14px max(env(safe-area-inset-bottom), 16px);
  border-top: var(--border-dim);
}
.import-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  border-radius: var(--radius-pill);
  font-size: 14px; font-weight: 600;
  letter-spacing: -0.01em;
  box-shadow: 0 4px 16px rgba(91,140,255,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
  transition: all 0.2s var(--ease-spring);
}
.import-btn:active {
  transform: scale(0.97);
  box-shadow: 0 2px 8px rgba(91,140,255,0.3);
}
.import-hint {
  font-size: 10.5px; color: var(--text-tertiary);
  text-align: center; margin-top: 8px; font-weight: 400;
}

/* ===== Modal ===== */
.modal {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 30; display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s var(--ease-smooth);
}
.modal.open { opacity: 1; pointer-events: auto; }
.modal-box {
  border-radius: var(--radius-lg);
  padding: 22px; width: 100%; max-width: 360px;
  max-height: 80vh; overflow-y: auto;
  background: rgba(20,20,40,0.85);
  border: var(--border-mid);
  backdrop-filter: blur(28px) saturate(190%);
  -webkit-backdrop-filter: blur(28px) saturate(190%);
  box-shadow: var(--shadow-deep);
  position: relative; isolation: isolate;
  transform: scale(0.92);
  transition: transform 0.3s var(--ease-spring);
}
.modal-box::before {
  content: ''; position: absolute; inset: 0; z-index: -1;
  border-radius: inherit;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), inset 0 0 30px -10px rgba(255,255,255,0.15);
  pointer-events: none;
}
.modal.open .modal-box { transform: scale(1); }
.modal-box h3 {
  margin: 0 0 16px; font-size: 17px; font-weight: 700;
  letter-spacing: -0.02em;
}
.modal-box label {
  display: block; font-size: 11px; color: var(--text-secondary);
  margin-bottom: 6px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.modal-box input[type="text"], .modal-box input[type="file"] {
  width: 100%; padding: 11px 12px;
  background: var(--tint-soft);
  border: var(--border-dim);
  border-radius: var(--radius-sm);
  color: var(--text-primary); font-size: 14px;
  margin-bottom: 14px;
  transition: all 0.2s var(--ease-smooth);
}
.modal-box input[type="text"]:focus {
  outline: none;
  border-color: rgba(91,140,255,0.5);
  background: var(--tint-medium);
  box-shadow: 0 0 0 3px rgba(91,140,255,0.15);
}
.modal-box input[type="file"] {
  padding: 9px;
  font-size: 12px;
  color: var(--text-secondary);
}
.modal-buttons { display: flex; gap: 8px; margin-top: 4px; }
.modal-buttons button {
  flex: 1; padding: 12px;
  border-radius: var(--radius-pill);
  font-size: 13.5px; font-weight: 600;
  transition: all 0.2s var(--ease-spring);
  border: var(--border-dim);
}
.btn-cancel {
  background: var(--tint-soft);
  color: var(--text-secondary);
}
.btn-cancel:active { transform: scale(0.97); background: var(--tint-medium); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  color: #fff;
  border-color: rgba(255,255,255,0.3);
  box-shadow: 0 4px 12px rgba(91,140,255,0.3);
}
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled {
  background: var(--tint-medium);
  color: var(--text-tertiary);
  box-shadow: none;
}

.info-text {
  font-size: 13px; line-height: 1.75; color: var(--text-primary);
  font-weight: 300;
}
.info-text strong { font-weight: 600; }
.info-text .info-section {
  margin-top: 14px; padding-top: 14px;
  border-top: var(--border-dim);
}

/* Toast */
.toast {
  position: absolute; bottom: 35%; left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 11px 22px;
  border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 500;
  z-index: 50;
  background: rgba(20,20,40,0.85);
  border: var(--border-mid);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  box-shadow: var(--shadow-float);
  opacity: 0; pointer-events: none;
  transition: all 0.3s var(--ease-spring);
}
.toast.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Scrollbar */
::-webkit-scrollbar { width: 0; }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .bg-mesh::before, .bg-mesh::after, .bg-blob {
    animation: none;
  }
  * { animation-duration: 0.01s !important; transition-duration: 0.05s !important; }
}
</style>
</head>
<body>
<div class="bg-mesh"><div class="bg-blob"></div></div>

<div id="app">
  <!-- Header -->
  <div class="header">
    <button class="icon-btn" id="menuBtn" aria-label="Menu">☰</button>
    <h1 id="title">Shadowing</h1>
    <button class="icon-btn" id="infoBtn" aria-label="Info">ⓘ</button>
  </div>

  <!-- Main -->
  <div class="main" id="main">
    <div class="empty" id="empty">
      <div class="empty-icon">🎧</div>
      <div class="empty-text">
        左上の <strong>☰</strong> から<br>
        音声と文字起こしを<br>インポートしてください
      </div>
    </div>
  </div>

  <!-- Player -->
  <div class="player hidden" id="player">
    <div class="progress-row">
      <span id="curTime">0:00</span>
      <div class="progress" id="progress">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span id="totTime">0:00</span>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="prevBtn">⏮</button>
      <button class="ctrl-btn" id="back5Btn">-5</button>
      <button class="ctrl-btn play" id="playBtn">▶</button>
      <button class="ctrl-btn" id="fwd5Btn">+5</button>
      <button class="ctrl-btn" id="nextBtn">⏭</button>
    </div>
    <div class="speed-row">
      <button class="speed-btn" data-speed="0.5">0.5×</button>
      <button class="speed-btn" data-speed="0.75">0.75×</button>
      <button class="speed-btn active" data-speed="1">1×</button>
      <button class="speed-btn" data-speed="1.25">1.25×</button>
      <button class="speed-btn" data-speed="1.5">1.5×</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="overlay" id="overlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Library</h2>
      <button class="icon-btn" id="closeSidebar">✕</button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
    <div class="import-area">
      <button class="import-btn" id="importBtn">+ 新しくインポート</button>
      <div class="import-hint">音声 (OGG / MP3 / M4A) と文字起こし (txt)</div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal" id="importModal">
    <div class="modal-box">
      <h3>新しい素材を追加</h3>
      <label>タイトル</label>
      <input type="text" id="impTitle" placeholder="例: Sleep Number店訪問">
      <label>音声ファイル</label>
      <input type="file" id="impAudio" accept="audio/*">
      <label>文字起こし (.txt)</label>
      <input type="file" id="impText" accept=".txt,text/plain">
      <div class="modal-buttons">
        <button class="btn-cancel" id="impCancel">キャンセル</button>
        <button class="btn-primary" id="impSave" disabled>保存</button>
      </div>
    </div>
  </div>

  <!-- Info Modal -->
  <div class="modal" id="infoModal">
    <div class="modal-box">
      <h3>使い方</h3>
      <div class="info-text">
        ・タイムスタンプをタップで該当箇所へジャンプ<br>
        ・チェックボックスで進捗管理<br>
        ・各段落の <strong>🔁</strong> でA-Bリピート設定<br>
        　（2段落を選ぶと、その間をループ再生）<br>
        ・速度を下げても音程は変わりません
        <div class="info-section">
          <strong>ホーム画面に追加</strong><br>
          Safariの共有ボタン →「ホーム画面に追加」で<br>アプリのように使えます。<br>
          データはこの端末のブラウザ内に保存されます。
        </div>
      </div>
      <div class="modal-buttons" style="margin-top:18px;">
        <button class="btn-primary" id="infoClose">閉じる</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
'use strict';

// ============ IndexedDB ============
const DB_NAME = 'shadowingDB';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('materials')) {
        d.createObjectStore('materials', { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}
function dbGet(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('materials', 'readonly');
    const req = tx.objectStore('materials').get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}
function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('materials', 'readonly');
    const req = tx.objectStore('materials').getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = (e) => reject(e.target.error);
  });
}
function dbPut(material) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('materials', 'readwrite');
    tx.objectStore('materials').put(material);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}
function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('materials', 'readwrite');
    tx.objectStore('materials').delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

// ============ Transcript Parser ============
function parseTranscript(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
  const paras = [];
  const tsRegex = /^(\d{1,2}):(\d{2}):(\d{2})\s+(.+)$/;
  const shortTsRegex = /^(\d{1,2}):(\d{2})\s+(.+)$/;
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    let m = line.match(tsRegex);
    let seconds = null, speaker = null;
    if (m) {
      seconds = (+m[1]) * 3600 + (+m[2]) * 60 + (+m[3]);
      speaker = m[4].trim();
    } else {
      m = line.match(shortTsRegex);
      if (m) {
        seconds = (+m[1]) * 60 + (+m[2]);
        speaker = m[3].trim();
      }
    }
    if (seconds !== null && i + 1 < lines.length) {
      paras.push({ time: seconds, speaker, text: lines[i + 1] });
      i += 2;
    } else {
      if (paras.length > 0) {
        paras[paras.length - 1].text += ' ' + line;
      }
      i++;
    }
  }
  return paras;
}

function formatTime(s) {
  if (!isFinite(s) || s < 0) s = 0;
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}
function formatTimestamp(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  if (h > 0) {
    return `${h}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
  }
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// ============ State ============
let materials = [];
let currentId = null;
let currentMaterial = null;
let currentAudioURL = null;
let activeParaIdx = -1;
let abMarks = [];
let currentSpeed = 1;

const $ = id => document.getElementById(id);
const audio = $('audio');

// ============ Sidebar ============
function openSidebar() {
  $('sidebar').classList.add('open');
  $('overlay').classList.add('open');
}
function closeSidebar() {
  $('sidebar').classList.remove('open');
  $('overlay').classList.remove('open');
}
$('menuBtn').onclick = openSidebar;
$('closeSidebar').onclick = closeSidebar;
$('overlay').onclick = closeSidebar;

function renderSidebar() {
  const list = $('sidebarList');
  list.innerHTML = '';
  if (materials.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">まだ素材がありません<br>下のボタンから追加</div>';
    return;
  }
  materials.forEach((m, i) => {
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (m.id === currentId ? ' active' : '');
    item.style.animationDelay = (i * 0.04) + 's';
    item.style.animation = 'fadeUp 0.3s var(--ease-smooth) backwards';
    const total = m.paragraphs.length;
    const done = Object.values(m.progress || {}).filter(Boolean).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    item.innerHTML = `
      <div class="sidebar-item-info">
        <div class="sidebar-item-title"></div>
        <div class="sidebar-item-meta">
          <span>${done}/${total}</span>
          <div class="mini-progress"><div class="mini-progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <button class="sidebar-item-delete">削除</button>
    `;
    item.querySelector('.sidebar-item-title').textContent = m.title;
    item.querySelector('.sidebar-item-info').onclick = () => {
      loadMaterial(m.id);
      closeSidebar();
    };
    item.querySelector('.sidebar-item-delete').onclick = async (e) => {
      e.stopPropagation();
      if (!confirm(`「${m.title}」を削除しますか？`)) return;
      await dbDelete(m.id);
      if (m.id === currentId) {
        currentId = null;
        currentMaterial = null;
        if (currentAudioURL) URL.revokeObjectURL(currentAudioURL);
        currentAudioURL = null;
        audio.src = '';
        $('player').classList.add('hidden');
        $('title').textContent = 'Shadowing';
        $('main').innerHTML = '';
        $('main').appendChild(emptyEl());
      }
      await loadMaterialsList();
    };
    list.appendChild(item);
  });
}

function emptyEl() {
  const div = document.createElement('div');
  div.className = 'empty';
  div.id = 'empty';
  div.innerHTML = `<div class="empty-icon">🎧</div>
    <div class="empty-text">左上の <strong>☰</strong> から<br>音声と文字起こしを<br>インポートしてください</div>`;
  return div;
}

// ============ Import Modal ============
$('importBtn').onclick = () => {
  $('impTitle').value = '';
  $('impAudio').value = '';
  $('impText').value = '';
  $('impSave').disabled = true;
  $('importModal').classList.add('open');
};
$('impCancel').onclick = () => $('importModal').classList.remove('open');

function checkImpReady() {
  const ok = $('impTitle').value.trim() && $('impAudio').files[0] && $('impText').files[0];
  $('impSave').disabled = !ok;
}
$('impTitle').oninput = checkImpReady;
$('impAudio').onchange = () => {
  if ($('impAudio').files[0] && !$('impTitle').value.trim()) {
    const name = $('impAudio').files[0].name.replace(/\.[^.]+$/, '');
    $('impTitle').value = name;
  }
  checkImpReady();
};
$('impText').onchange = checkImpReady;

$('impSave').onclick = async () => {
  $('impSave').disabled = true;
  const title = $('impTitle').value.trim();
  const audioFile = $('impAudio').files[0];
  const textFile = $('impText').files[0];
  try {
    const textContent = await textFile.text();
    const paragraphs = parseTranscript(textContent);
    if (paragraphs.length === 0) {
      showToast('文字起こしの解析に失敗しました');
      $('impSave').disabled = false;
      return;
    }
    const material = {
      id: 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      title,
      audioBlob: audioFile,
      audioType: audioFile.type || 'audio/ogg',
      paragraphs,
      progress: {},
      createdAt: Date.now()
    };
    await dbPut(material);
    await loadMaterialsList();
    $('importModal').classList.remove('open');
    showToast(`${paragraphs.length}段落をインポートしました`);
    loadMaterial(material.id);
    closeSidebar();
  } catch (e) {
    console.error(e);
    showToast('保存に失敗しました');
    $('impSave').disabled = false;
  }
};

// ============ Material Loading ============
async function loadMaterialsList() {
  materials = await dbGetAll();
  materials.sort((a, b) => b.createdAt - a.createdAt);
  renderSidebar();
}

async function loadMaterial(id) {
  const m = await dbGet(id);
  if (!m) return;
  currentId = id;
  currentMaterial = m;
  abMarks = [];
  activeParaIdx = -1;
  if (currentAudioURL) URL.revokeObjectURL(currentAudioURL);
  currentAudioURL = URL.createObjectURL(m.audioBlob);
  audio.src = currentAudioURL;
  audio.playbackRate = currentSpeed;
  audio.preservesPitch = true;
  audio.mozPreservesPitch = true;
  audio.webkitPreservesPitch = true;
  $('title').textContent = m.title;
  $('player').classList.remove('hidden');
  renderParagraphs();
  renderSidebar();
}

// ============ Paragraph Rendering ============
function renderParagraphs() {
  const main = $('main');
  main.innerHTML = '';
  if (!currentMaterial) {
    main.appendChild(emptyEl());
    return;
  }
  currentMaterial.paragraphs.forEach((p, idx) => {
    const div = document.createElement('div');
    div.className = 'paragraph';
    div.dataset.idx = idx;
    div.style.animationDelay = Math.min(idx * 0.03, 0.4) + 's';
    if (currentMaterial.progress[idx]) div.classList.add('done');
    if (abMarks.includes(idx)) div.classList.add('ab-marked');

    const head = document.createElement('div');
    head.className = 'paragraph-head';

    const cb = document.createElement('button');
    cb.className = 'checkbox' + (currentMaterial.progress[idx] ? ' checked' : '');
    cb.innerHTML = currentMaterial.progress[idx] ? '✓' : '';
    cb.onclick = (e) => { e.stopPropagation(); toggleDone(idx); };

    const ts = document.createElement('button');
    ts.className = 'timestamp';
    ts.textContent = formatTimestamp(p.time);
    ts.onclick = (e) => { e.stopPropagation(); jumpTo(p.time); };

    const sp = document.createElement('span');
    sp.className = 'speaker';
    sp.textContent = p.speaker;

    const abBtn = document.createElement('button');
    abBtn.className = 'ab-btn' + (abMarks.includes(idx) ? ' active' : '');
    abBtn.innerHTML = '🔁';
    abBtn.onclick = (e) => { e.stopPropagation(); toggleAB(idx); };

    head.append(cb, ts, sp, abBtn);

    const txt = document.createElement('p');
    txt.className = 'paragraph-text';
    txt.textContent = p.text;

    div.append(head, txt);
    div.onclick = () => jumpTo(p.time);
    main.appendChild(div);
  });
}

function toggleDone(idx) {
  currentMaterial.progress[idx] = !currentMaterial.progress[idx];
  const el = document.querySelector(`.paragraph[data-idx="${idx}"]`);
  if (el) {
    el.classList.toggle('done', !!currentMaterial.progress[idx]);
    const cb = el.querySelector('.checkbox');
    cb.classList.toggle('checked', !!currentMaterial.progress[idx]);
    cb.innerHTML = currentMaterial.progress[idx] ? '✓' : '';
  }
  dbPut(currentMaterial);
  const sm = materials.find(m => m.id === currentId);
  if (sm) sm.progress = currentMaterial.progress;
}

function toggleAB(idx) {
  const pos = abMarks.indexOf(idx);
  if (pos >= 0) {
    abMarks.splice(pos, 1);
  } else {
    abMarks.push(idx);
    if (abMarks.length > 2) abMarks.shift();
  }
  abMarks.sort((a, b) => a - b);
  document.querySelectorAll('.paragraph').forEach((el, i) => {
    el.classList.toggle('ab-marked', abMarks.includes(i));
    const btn = el.querySelector('.ab-btn');
    if (btn) btn.classList.toggle('active', abMarks.includes(i));
  });
  if (abMarks.length === 2) {
    showToast(`A-Bリピート: 段落 ${abMarks[0] + 1}〜${abMarks[1] + 1}`);
  } else if (abMarks.length === 1) {
    showToast(`A点セット — もう1段落を選択`);
  } else {
    showToast('A-Bリピート解除');
  }
}

// ============ Player ============
function jumpTo(seconds) {
  if (!audio.src) return;
  audio.currentTime = seconds;
  audio.play().catch(()=>{});
}

$('playBtn').onclick = () => {
  if (!audio.src) return;
  if (audio.paused) audio.play().catch(()=>{});
  else audio.pause();
};
$('back5Btn').onclick = () => { audio.currentTime = Math.max(0, audio.currentTime - 5); };
$('fwd5Btn').onclick = () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5); };
$('prevBtn').onclick = () => {
  if (!currentMaterial) return;
  const idx = findParaAt(audio.currentTime);
  const target = Math.max(0, idx - 1);
  jumpTo(currentMaterial.paragraphs[target].time);
};
$('nextBtn').onclick = () => {
  if (!currentMaterial) return;
  const idx = findParaAt(audio.currentTime);
  const target = Math.min(currentMaterial.paragraphs.length - 1, idx + 1);
  jumpTo(currentMaterial.paragraphs[target].time);
};

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.onclick = () => {
    const s = parseFloat(btn.dataset.speed);
    currentSpeed = s;
    audio.playbackRate = s;
    audio.preservesPitch = true;
    audio.mozPreservesPitch = true;
    audio.webkitPreservesPitch = true;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b === btn));
  };
});

audio.addEventListener('play', () => $('playBtn').textContent = '⏸');
audio.addEventListener('pause', () => $('playBtn').textContent = '▶');
audio.addEventListener('loadedmetadata', () => {
  $('totTime').textContent = formatTime(audio.duration);
});
audio.addEventListener('timeupdate', () => {
  $('curTime').textContent = formatTime(audio.currentTime);
  const dur = audio.duration || 1;
  $('progressFill').style.width = (audio.currentTime / dur * 100) + '%';
  if (currentMaterial) {
    const idx = findParaAt(audio.currentTime);
    if (idx !== activeParaIdx) {
      const prev = document.querySelector('.paragraph.active');
      if (prev) prev.classList.remove('active');
      const cur = document.querySelector(`.paragraph[data-idx="${idx}"]`);
      if (cur) {
        cur.classList.add('active');
        const rect = cur.getBoundingClientRect();
        const mainRect = $('main').getBoundingClientRect();
        if (rect.top < mainRect.top + 60 || rect.bottom > mainRect.bottom - 80) {
          cur.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }
      activeParaIdx = idx;
    }
    if (abMarks.length === 2) {
      const [a, b] = abMarks;
      const endTime = (b + 1 < currentMaterial.paragraphs.length)
        ? currentMaterial.paragraphs[b + 1].time
        : (audio.duration || Infinity);
      if (audio.currentTime >= endTime - 0.05) {
        audio.currentTime = currentMaterial.paragraphs[a].time;
      }
    }
  }
});

function findParaAt(t) {
  if (!currentMaterial) return -1;
  const ps = currentMaterial.paragraphs;
  let idx = 0;
  for (let i = 0; i < ps.length; i++) {
    if (ps[i].time <= t) idx = i;
    else break;
  }
  return idx;
}

$('progress').onclick = (e) => {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  audio.currentTime = (x / rect.width) * audio.duration;
};

$('infoBtn').onclick = () => $('infoModal').classList.add('open');
$('infoClose').onclick = () => $('infoModal').classList.remove('open');

let toastTimer = null;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

(async () => {
  try {
    await openDB();
    await loadMaterialsList();
    if (materials.length > 0) loadMaterial(materials[0].id);
  } catch (e) {
    console.error(e);
    showToast('初期化エラー');
  }
})();

document.addEventListener('dblclick', e => e.preventDefault());
</script>
</body>
</html>
